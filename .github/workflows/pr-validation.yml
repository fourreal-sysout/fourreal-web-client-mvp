name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR template
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          
          # Check for required sections
          if ! echo "$PR_BODY" | grep -q "## Summary"; then
            echo "❌ Missing '## Summary' section"
            exit 1
          fi
          
          if ! echo "$PR_BODY" | grep -q "## Type of Change"; then
            echo "❌ Missing '## Type of Change' section"
            exit 1
          fi
          
          if ! echo "$PR_BODY" | grep -q "## Description"; then
            echo "❌ Missing '## Description' section"
            exit 1
          fi
          
          if ! echo "$PR_BODY" | grep -q "## Testing"; then
            echo "❌ Missing '## Testing' section"
            exit 1
          fi
          
          if ! echo "$PR_BODY" | grep -q "## Breaking Changes"; then
            echo "❌ Missing '## Breaking Changes' section"
            exit 1
          fi
          
          if ! echo "$PR_BODY" | grep -q "## Checklist"; then
            echo "❌ Missing '## Checklist' section"
            exit 1
          fi
          
          echo "✅ PR template validation passed"

      - name: Validate commit messages
        run: |
          # Fetch PR commits
          git fetch --depth=1 origin ${{ github.event.pull_request.head.sha }}
          
          # Install commitlint
          npm install -g @commitlint/cli @commitlint/config-conventional
          
          # Validate each commit using git log with null delimiter
          git log --format='%B' origin/main..${{ github.event.pull_request.head.sha }} --pretty=format:"---COMMIT---%n%B" | while IFS= read -r line; do
            if [ "$line" = "---COMMIT---" ]; then
              if [ -n "$current_commit" ]; then
                echo "$current_commit" | npx commitlint
              fi
              current_commit=""
            else
              current_commit="$current_commit$line"$'\n'
            fi
          done
          
          # Validate last commit
          if [ -n "$current_commit" ]; then
            echo "$current_commit" | npx commitlint
          fi
          
          echo "✅ Commit message validation passed"
