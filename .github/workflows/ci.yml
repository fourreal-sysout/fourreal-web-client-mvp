name: CI

on:
  push:
    branches: [ main, "feat/**", "fix/**", "refactor/**" ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Type check
        run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build

      - name: SonarCloud analysis
        if: always()
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trigger-e2e:
    name: Trigger E2E Suite
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Dispatch E2E run to fourreal-qa
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_QA_DISPATCH_TOKEN }}
          repository: fourreal-sysout/fourreal-qa
          event-type: e2e-triggered
          client-payload: |
            {
              "source_repo": "${{ github.repository }}",
              "sha": "${{ github.sha }}"
            }
